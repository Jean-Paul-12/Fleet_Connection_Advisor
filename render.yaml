services:
  - type: web
    name: fleet-advisor-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: WEATHER_API_PROVIDER
        value: weatherstack
      - key: WEATHER_API_KEY
        sync: false
      - key: WEATHER_API_BASE_URL
        value: http://api.weatherstack.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
